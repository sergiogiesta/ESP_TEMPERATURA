<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP_TEMPERATURA</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🌡️ Temperatura EM OFICINA COM ESP8266</h1>

<h2 id="temp">-- °C</h2>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
const client = mqtt.connect("wss://492ae152deb84e1e9d8997fd3e55c423.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "SERGIOSANTOS",
  password: "SERGIOsantos1010887"
});

client.on("connect", () => {
  console.log("Ligado ao MQTT");
  client.subscribe("casa/temperatura");
});

client.on("message", (topic, message) => {
  if (topic === "casa/temperatura") {
    document.getElementById("temp").innerText = message.toString() + " °C";
  }
});
</script>

</body>
</html>
